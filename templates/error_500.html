<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal Server Error - NGO Connect</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet">
    <link rel="icon" href="{{ url_for('static', filename='images/favicon.png') }}">
</head>
<body class="auth-wrapper">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card auth-card border-0 shadow-lg">
                    <div class="card-body p-4 p-md-5 text-center">
                        <div class="logo-circle-auth mb-4" style="width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background-color: rgba(220, 53, 69, 0.1); margin: 0 auto; color: #dc3545; font-size: 32px;">
                            <i class="bi bi-exclamation-octagon-fill"></i>
                        </div>
                        <h2 class="fw-bold text-dark mt-2">Something Went Wrong</h2>
                        <p class="text-secondary mt-3">The server encountered an internal error and was unable to complete your request. Our team has been notified.</p>
                        <p class="text-muted small">Please try again later or contact support if the issue persists.</p>
                        <div class="d-grid gap-2 mt-4">
                            <a href="{{ url_for('index') }}" class="btn btn-primary py-2.5">Back to Safety</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
