<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - NGO Connect</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet">
    <link rel="icon" href="{{ url_for('static', filename='images/favicon.png') }}">
</head>
<body class="auth-wrapper">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                
                <!-- Flash messages -->
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ 'success' if category == 'success' else 'danger' }} alert-dismissible fade show border-0 shadow-sm mb-3" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                            </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <div class="card auth-card border-0">
                    <div class="card-body p-4 p-md-5">
                        <div class="text-center mb-4">
                            <div class="logo-circle-auth" style="width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; margin: 0 auto; border: 2px solid white; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="NGO Connect Logo" style="width: 100%; height: 100%; object-fit: contain;">
                            </div>
                            <h2 class="fw-bold text-dark mt-2">Reset Password</h2>
                            <p class="text-secondary">Enter your new security credentials below</p>
                        </div>
                        
                        <form method="POST" class="needs-validation" novalidate>
                            <!-- Password Input -->
                            <div class="mb-3">
                                <label for="password" class="form-label fw-semibold">New Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                                    <input type="password" name="password" class="form-control border-start-0 ps-0" placeholder="Min 8 chars, 1 uppercase, 1 special" id="password" required oninput="checkPasswordStrength(this.value)">
                                </div>
                                <!-- Password Strength Meter -->
                                <div class="progress mt-2" style="height: 6px;">
                                    <div id="password-strength-bar" class="progress-bar" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
                                </div>
                                <small id="password-strength-text" class="form-text text-muted"></small>
                            </div>
                            
                            <!-- Confirm Password Input -->
                            <div class="mb-4">
                                <label for="confirm_password" class="form-label fw-semibold">Confirm Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-shield-check text-muted"></i></span>
                                    <input type="password" name="confirm_password" class="form-control border-start-0 ps-0" placeholder="••••••••" id="confirm_password" required>
                                </div>
                            </div>
                            
                            <!-- Submit Button -->
                            <div class="d-grid mb-3">
                                <button type="submit" class="btn btn-primary py-2.5 btn-lg fs-6">Update Password</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function checkPasswordStrength(password) {
            const bar = document.getElementById('password-strength-bar');
            const text = document.getElementById('password-strength-text');
            let strength = 0;
            
            if (password.length >= 8) strength += 25;
            if (/[A-Z]/.test(password)) strength += 25;
            if (/[0-9]/.test(password)) strength += 25;
            if (/[^A-Za-z0-9]/.test(password)) strength += 25;
            
            bar.style.width = strength + '%';
            
            if (strength === 0) {
                bar.className = 'progress-bar bg-danger';
                text.textContent = '';
            } else if (strength <= 25) {
                bar.className = 'progress-bar bg-danger';
                text.className = 'form-text text-danger small';
                text.textContent = 'Weak';
            } else if (strength <= 50) {
                bar.className = 'progress-bar bg-warning';
                text.className = 'form-text text-warning small';
                text.textContent = 'Fair';
            } else if (strength <= 75) {
                bar.className = 'progress-bar bg-info';
                text.className = 'form-text text-info small';
                text.textContent = 'Good';
            } else {
                bar.className = 'progress-bar bg-success';
                text.className = 'form-text text-success small';
                text.textContent = 'Strong';
            }
        }
    </script>
</body>
</html>
